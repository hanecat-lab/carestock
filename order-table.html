<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>注文管理表</title>
<style>
@page {
  size: 297mm 210mm;
  margin: 5mm;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans CJK JP', 'Noto Sans JP', 'IPAPGothic', sans-serif;
  font-size: 7px;
  color: #111;
  background: #fff;
  line-height: 1.3;
}
.page {
  page-break-after: always;
}
.page:last-child {
  page-break-after: auto;
}
.page-title {
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  border-bottom: 1.5px solid #333;
  padding-bottom: 2mm;
  margin-bottom: 0;
}
table {
  border-collapse: collapse;
  width: 100%;
  table-layout: fixed;
}
th, td {
  border: 0.5px solid #888;
  vertical-align: top;
}
.col-cat      { width: 10mm; }
.col-product  { width: 30mm; }
.col-week-l   { width: 15.2mm; }
.col-week-r   { width: 15.2mm; }
tbody tr td { border-top: 0.8px solid #666; }
.cat-start td, .cat-start th { border-top: 2px solid #000 !important; }
.cat-td {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  text-align: center;
  vertical-align: middle;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 1px;
  border-color: #555;
}
.week-sep  { border-left: 3px solid #000 !important; }
.order-sep { border-left: 0.8px solid #555 !important; }
.week-th {
  text-align: center;
  font-size: 6.5px;
  font-weight: 700;
  background: #fff;
  padding: 1px;
}
.week-num {
  display: block;
  font-size: 7.5px;
  font-weight: 900;
  letter-spacing: -0.3px;
}
.week-date-blank {
  display: inline-block;
  border-bottom: 0.7px solid #000;
  width: 26mm;
  height: 7px;
  margin-top: 1px;
}
.sub-th {
  background: #fff;
  font-size: 12px;
  font-weight: 700;
  text-align: center;
  padding: 1px 0;
  color: #000;
  border-top: 0.5px solid #555;
}
.product-col {
  background: #fff;
  vertical-align: middle;
  padding: 6px 3px;
}
.product-label {
  font-size: 15px;
  font-weight: 900;
  color: #000;
  text-align: center;
}
.product-name {
  font-size: 9.6px;
  color: #000;
  margin-top: 10px;
  text-align: right;
}
.product-spec {
  font-size: 5.5px;
  color: #555;
  margin-top: 0.5px;
}
.section-td {
  background: #fff;
  font-weight: 700;
  font-size: 7.5px;
  text-align: center;
  padding: 1px 2px;
  color: #000;
  border-color: #555;
}
.data-cell {
  padding: 8px 1px;
}
.cell-row {
  display: flex;
  align-items: center;
  gap: 1px;
  font-size: 6.5px;
}
.cell-row + .cell-row {
  margin-top: 14px;
}
.check-o {
  flex-shrink: 0;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  border: 0.7px solid #000;
}
.bl {
  display: inline-block;
  border-bottom: 0.5px solid #000;
  height: 9px;
}
.bl-xs { width: 14px; }
.bl-s  { width: 11px; }
.lbl { color: #000; font-size: 5.5px; }

@media screen {
  body { background: #e0e0e0; padding: 10px; }
  .page {
    background: #fff;
    margin-bottom: 20px;
    padding: 5mm;
    width: 297mm;
    min-height: 210mm;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .print-note {
    background: #fff3cd;
    border: 1px solid #f0ad4e;
    border-radius: 4px;
    padding: 8px 14px;
    margin-bottom: 14px;
    font-size: 13px;
    color: #333;
    width: 297mm;
  }
}
@media print {
  .print-note { display: none; }
  html { zoom: 0.91; }
}
</style>
</head>
<body>
<div class="print-note">⚠️ 印刷時は必ず <strong>横向き（ランドスケープ）</strong> を選択してください。</div>
<div id="root"></div>
<script>
var _APP_V = '0'; // AUTO_VERSION
(function(){
  var p = new URLSearchParams(location.search);
  if (p.get('v') !== _APP_V) { p.set('v', _APP_V); location.replace(location.pathname + '?' + p.toString()); }
})();
var PRODUCTS = [
  { label: '白小',   name: '尿取りパッド（2回）',  spec: '1箱144枚・1袋48枚',  cat: 'pad' },
  { label: '白大',   name: '尿取りパッド（4回）',  spec: '1箱224枚・1袋28枚',  cat: 'pad' },
  { label: 'グレー', name: '長時間安心パッド',     spec: '1箱144枚・1袋36枚',  cat: 'pad' },
  { label: '緑',     name: '夜パッド ふつう',      spec: '1箱120枚・1袋30枚',  cat: 'pad' },
  { label: '青',     name: '夜パッド 多い',        spec: '1箱90枚・1袋30枚',   cat: 'pad' },
  { label: '特多',   name: '夜パッド 特多',        spec: '1箱80枚・1袋20枚',   cat: 'pad' },
  { label: '10回',   name: '夜パッド 10回',        spec: '1箱64枚・1袋16枚',   cat: 'pad' },
  { label: '12回',   name: '夜パッド 12回',        spec: '1箱56枚・1袋14枚',   cat: 'pad' },
  { label: 'M〜L',   name: 'フィットパンツ M〜L',  spec: '1箱66枚・1袋22枚',   cat: 'pants' },
  { label: 'L〜LL',  name: 'フィットパンツ L〜LL', spec: '1箱60枚・1袋20枚',   cat: 'pants' },
  { label: 'S',      name: 'テープ止め S',         spec: '1箱66枚・1袋22枚',   cat: 'tape' },
  { label: 'M',      name: 'テープ止め M',         spec: '1箱80枚・1袋20枚',   cat: 'tape' },
  { label: 'L',      name: 'テープ止め L',         spec: '1箱80枚・1袋20枚',   cat: 'tape' },
  { label: '吸水シート', name: '吸水シート',           spec: '1箱576枚・1袋72枚',  cat: 'sheet' },
];

var SECTIONS = [
  { cat: 'pad',   label: '尿取りパッド' },
  { cat: 'pants', label: 'リハパン' },
  { cat: 'tape',  label: 'テープ止め' },
  { cat: 'sheet', label: 'ユニチャーム' },
];

var WEEKS = 8;

function stockCell() {
  return '<td class="week-sep" style="padding:5px 4px 4px;vertical-align:top;position:relative">'
    + '<div style="height:24px"></div>'
    + '</td>';
}

function orderCell() {
  return '<td class="order-sep" style="vertical-align:middle;padding:10px 3px"></td>';
}

function buildPage() {
  // カテゴリごとの商品数を集計
  var catCount = {};
  PRODUCTS.forEach(function(p) { catCount[p.cat] = (catCount[p.cat] || 0) + 1; });

  var html = '<div class="page">';
  html += '<div class="page-title" style="display:flex;align-items:baseline">'
        + '<span style="font-size:10px;font-weight:700;flex:1;text-align:left">在庫の箱数は「正」の字で、袋数は数字を〇で囲んで記入</span>'
        + '<span>尿取りパッド注文表</span>'
        + '<span style="flex:1"></span>'
        + '</div>';
  html += '<table>';

  // colgroup
  html += '<colgroup><col class="col-cat"><col class="col-product">';
  for (var i = 0; i < WEEKS; i++) {
    html += '<col class="col-week-l"><col class="col-week-r">';
  }
  html += '</colgroup>';

  // thead row1
  html += '<thead><tr>';
  html += '<th style="font-size:7px;font-weight:700;text-align:center;vertical-align:middle;padding:2px"></th>';
  html += '<th style="font-size:12px;font-weight:700;text-align:center;vertical-align:middle;padding:2px">商品</th>';
  for (var w = 1; w <= WEEKS; w++) {
    html += '<th class="week-th week-sep" colspan="2" style="padding:1px">'
          + '<span style="font-size:16px;color:#888">/</span>'
          + '<div style="display:flex;justify-content:space-around;font-size:8px;font-weight:700;color:#555;margin-top:1px">'
          + '<span>在庫</span><span>注文</span>'
          + '</div>'
          + '</th>';
  }
  html += '</tr></thead>';

  // tbody
  html += '<tbody>';
  var lastCat = null;
  PRODUCTS.forEach(function(p) {
    html += '<tr' + (p.cat !== lastCat ? ' class="cat-start"' : '') + '>';
    if (p.cat !== lastCat) {
      var sec = SECTIONS.filter(function(s) { return s.cat === p.cat; })[0];
      html += '<td class="cat-td" rowspan="' + catCount[p.cat] + '">' + sec.label + '</td>';
      lastCat = p.cat;
    }
    html += '<td class="product-col">'
          + '<div class="product-label">' + p.label + '</div>'
          + (p.name !== p.label ? '<div class="product-name">' + p.name + '</div>' : '')
          + '</td>';
    for (var j = 0; j < WEEKS; j++) {
      html += stockCell();
      html += orderCell();
    }
    html += '</tr>';
  });
  // サイン行
  html += '<tr style="height:14mm">';
  html += '<td></td>';
  html += '<td style="vertical-align:middle;text-align:center;font-size:15px;font-weight:700">搬入確認者</td>';
  for (var s = 0; s < WEEKS; s++) {
    html += '<td class="week-sep" colspan="2"></td>';
  }
  html += '</tr>';
  html += '</tbody></table>';
  html += '</div>';
  return html;
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('root').innerHTML =
    buildPage();
});
</script>
</body>
</html>
